    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #11110f;
        color: #f5f2ea;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      #app-loader.app-loader--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-loader__content {
        display: grid;
        justify-items: center;
        gap: 18px;
        padding: 24px;
        text-align: center;
      }

      .app-loader__brand {
        font: 600 12px/1.4 Inter, Arial, sans-serif;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .app-loader__line {
        width: min(220px, 58vw);
        height: 1px;
        overflow: hidden;
        background: rgba(245, 242, 234, 0.2);
      }

      .app-loader__line::after {
        content: '';
        display: block;
        width: 45%;
        height: 100%;
        background: #f5f2ea;
        animation: loader-line 1s cubic-bezier(.4, 0, .2, 1) infinite;
      }

      @keyframes loader-line {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(330%); }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-loader__line::after { animation-duration: 2s; }
      }
    </style>
  </head>

  <body>
    <div id="app-loader" role="status" aria-live="polite" aria-label="Chargement du site">
      <div class="app-loader__content">
        <span class="app-loader__brand">Les Pierres de Hamza</span>
        <span class="app-loader__line" aria-hidden="true"></span>
      </div>
    </div>

    <div id="root"></div>

    <noscript>Activez JavaScript pour consulter le site Les Pierres de Hamza.</noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
